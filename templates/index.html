<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UniFi Daily Briefing</title>
    <style>
      body { font-family: sans-serif; margin: 2rem auto; max-width: 960px; line-height: 1.4; }
      pre { white-space: pre-wrap; background: #111; color: #f5f5f5; padding: 1rem; border-radius: 8px; }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
      button { padding: 0.75rem 1rem; }
    </style>
    <script>
      async function run(endpoint) {
        const response = await fetch(endpoint, { method: 'POST' });
        if (!response.ok) { alert('Request failed'); return; }
        location.reload();
      }
    </script>
  </head>
  <body>
    <h1>UniFi Daily Briefing</h1>
    <p>Internal host target: <strong>{{ host }}</strong></p>
    <p>
      <button onclick="run('/api/collect')">Collect sample now</button>
      <button onclick="run('/api/reports/run')">Run report now</button>
    </p>
    <div class="cards">
      <div class="card">
        <h2>Latest report</h2>
        {% if latest %}
          <p><a href="/reports/{{ latest.id }}">{{ latest.title }}</a></p>
          <pre>{{ latest.markdown }}</pre>
        {% else %}
          <p>No reports yet.</p>
        {% endif %}
      </div>
      <div class="card">
        <h2>History</h2>
        <ul>
          {% for report in reports %}
          <li><a href="/reports/{{ report.id }}">{{ report.title }}</a></li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </body>
</html>
