apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-daily-briefing
  namespace: unifi-daily-briefing
  labels:
    app.kubernetes.io/name: unifi-daily-briefing
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: unifi-daily-briefing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-daily-briefing
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-daily-briefing
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: unifi-daily-briefing
    spec:
      containers:
        - name: web
          image: ghcr.io/bmobytes/unifi-daily-briefing:latest
          imagePullPolicy: IfNotPresent
          command: ["unifi-daily-briefing"]
          args: ["serve", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: unifi-daily-briefing-config
            - secretRef:
                name: unifi-daily-briefing-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unifi-daily-briefing-data
