apiVersion: v1
kind: Secret
metadata:
  name: unifi-daily-briefing-secrets
  namespace: unifi-daily-briefing
type: Opaque
stringData:
  UDB_UNIFI_BASE_URL: https://unifi.example.internal
  UDB_UNIFI_USERNAME: change-me-if-using-classic-auth
  UDB_UNIFI_PASSWORD: change-me-if-using-classic-auth
  UDB_UNIFI_API_KEY: change-me-if-using-api-key-auth
  UDB_DISCORD_WEBHOOK_URL: optional-webhook-url
  UDB_DISCORD_BOT_TOKEN: optional-bot-token
